server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - AddRequestHeader=X-Gateway-Secret, ${gateway.shared.secret}
          routes:
            - id: user-route
              uri: lb://USER-SERVICE
              predicates:
                  - Path=/api/user/**, /api/address/**
              filters:
                  - AuthenticationFilter

            - id: product-route
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/api/product/**, /api/category/**
              filters:
                - AuthenticationFilter

            - id: cart-route
              uri: lb://CART-SERVICE
              predicates:
                - Path=/api/cart/**
              filters:
                - AuthenticationFilter

            - id: order-route
              uri: lb://ORDER-SERVICE
              predicates:
                  - Path=/api/order/**
              filters:
                - AuthenticationFilter

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: always