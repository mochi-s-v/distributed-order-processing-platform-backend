services:
  eureka-service-registry:
    build: ./Eureka-service-registry
    container_name: shoppingMicroservice-eureka-service-registry
    ports:
      - "8761:8761"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - shopping-network

  api-gateway:
    build: ./api-gateway
    container_name: shoppingMicroservice-api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_SERVER_URL: http://eureka-service-registry:8761/eureka
      SPRING_GATEWAY_SECRET: ${SPRING_GATEWAY_SECRET}
      JWT_SIGNIN_KEY: ${JWT_SIGNIN_KEY}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      eureka-service-registry:
        condition: service_healthy
    networks:
      - shopping-network

  user-service:
    build: ./user-service
    container_name: shoppingMicroservice-user-service
    environment:
      EUREKA_SERVER_URL: http://eureka-service-registry:8761/eureka
      SPRING_DATASOURCE_URL: JDBC:mysql://user-db:3306/shopping_microservice_users
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_GATEWAY_SECRET: ${SPRING_GATEWAY_SECRET}
      JWT_SIGNIN_KEY: ${JWT_SIGNIN_KEY}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      user-db:
        condition: service_healthy
      eureka-service-registry:
        condition: service_healthy
    networks:
      - shopping-network

  product-service:
    build: ./product-service
    container_name: shoppingMicroservice-product-service
    environment:
      EUREKA_SERVER_URL: http://eureka-service-registry:8761/eureka
      SPRING_DATASOURCE_URL: JDBC:mysql://product-db:3306/shopping_microservice_products
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_GATEWAY_SECRET: ${SPRING_GATEWAY_SECRET}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/actuator/health" ]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      product-db:
        condition: service_healthy
      eureka-service-registry:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shopping-network

  cart-service:
    build: ./cart-service
    container_name: shoppingMicroservice-cart-service
    environment:
      EUREKA_SERVER_URL: http://eureka-service-registry:8761/eureka
      SPRING_DATASOURCE_URL: JDBC:mysql://cart-db:3306/shopping_microservice_cart
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_GATEWAY_SECRET: ${SPRING_GATEWAY_SECRET}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8083/actuator/health" ]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      cart-db:
        condition: service_healthy
      eureka-service-registry:
        condition: service_healthy
    networks:
      - shopping-network

  order-service:
    build: ./order-service
    container_name: shoppingMicroservice-order-service
    environment:
      EUREKA_SERVER_URL: http://eureka-service-registry:8761/eureka
      SPRING_DATASOURCE_URL: JDBC:mysql://order-db:3306/shopping_microservice_orders
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_GATEWAY_SECRET: ${SPRING_GATEWAY_SECRET}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8084/actuator/health" ]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      order-db:
        condition: service_healthy
      eureka-service-registry:
        condition: service_healthy
      kafka-1:
        condition: service_started
      kafka-2:
        condition: service_started
      kafka-3:
        condition: service_started
    networks:
      - shopping-network

  payment-gateway-service:
    build: ./payment-gateway-service
    container_name: shoppingMicroservice-payment-gateway-service
    environment:
      EUREKA_SERVER_URL: http://eureka-service-registry:8761/eureka
      SPRING_DATASOURCE_URL: JDBC:mysql://payment-db:3306/shopping_microservice_payments
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_GATEWAY_SECRET: ${SPRING_GATEWAY_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_KEY: ${STRIPE_WEBHOOK_KEY}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8085/actuator/health" ]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      payment-db:
        condition: service_healthy
      eureka-service-registry:
        condition: service_healthy
      kafka-1:
        condition: service_started
      kafka-2:
        condition: service_started
      kafka-3:
        condition: service_started
    networks:
      - shopping-network

  stripe-cli:
    image: stripe/stripe-cli:latest
    command: listen --forward-to http://payment-gateway-service:8085/webhook/stripe
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY}
    volumes:
      - ~/.config/stripe:/root/.config/stripe
    depends_on:
      payment-gateway-service:
        condition: service_healthy
    networks:
      - shopping-network

  notification-service:
    build: ./notification-service
    container_name: shoppingMicroservice-notification-service
    environment:
      EUREKA_SERVER_URL: http://eureka-service-registry:8761/eureka
      GMAIL_USERNAME: ${GMAIL_USERNAME}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8086/actuator/health" ]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      eureka-service-registry:
        condition: service_healthy
      kafka-1:
        condition: service_started
      kafka-2:
        condition: service_started
      kafka-3:
        condition: service_started
    networks:
      - shopping-network

  kafka-1:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-1
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: "Mk3OEYBSD34fcwNTJENDM2Qk"
    volumes:
      - kafka-1-volume:/var/lib/kafka/data
    networks:
      - shopping-network

  kafka-2:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-2
    ports:
      - "9095:9092"
      - "9096:9094"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092,EXTERNAL://localhost:9096
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: "Mk3OEYBSD34fcwNTJENDM2Qk"
    volumes:
      - kafka-2-volume:/var/lib/kafka/data
    networks:
      - shopping-network

  kafka-3:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-3
    ports:
      - "9097:9092"
      - "9098:9094"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092,EXTERNAL://localhost:9098
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: "Mk3OEYBSD34fcwNTJENDM2Qk"
    volumes:
      - kafka-3-volume:/var/lib/kafka/data
    networks:
      - shopping-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
    depends_on:
      kafka-1:
        condition: service_started
      kafka-2:
        condition: service_started
      kafka-3:
        condition: service_started
    networks:
      - shopping-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./Monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      api-gateway:
        condition: service_healthy
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-gateway-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - shopping-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    user: "472"
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./Monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./Monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - shopping-network

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - shopping-network

  redis:
    image: redis:8.6.4-trixie
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-volume:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopping-network

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    ports:
      - "5540:5540"
    environment:
      RI_ACCEPT_TERMS_AND_CONDITIONS: "true"
      RI_REDIS_HOST: redis
      RI_REDIS_PORT: 6379
      RI_REDIS_ALIAS: shopping-redis
    volumes:
      - redis-insight-volume:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - shopping-network

  user-db:
    image: mysql:latest
    container_name: shoppingMicroservice-user-db
    environment:
      MYSQL_ROOT_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      MYSQL_DATABASE: shopping_microservice_users
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${SPRING_DATASOURCE_PASSWORD}" ]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - user-db-volume:/var/lib/mysql
    networks:
      - shopping-network

  product-db:
    image: mysql:latest
    container_name: shoppingMicroservice-product-db
    environment:
      MYSQL_ROOT_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      MYSQL_DATABASE: shopping_microservice_products
    ports:
      - "3307:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${SPRING_DATASOURCE_PASSWORD}" ]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - product-db-volume:/var/lib/mysql
    networks:
      - shopping-network

  cart-db:
    image: mysql:latest
    container_name: shoppingMicroservice-cart-db
    environment:
      MYSQL_ROOT_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      MYSQL_DATABASE: shopping_microservice_cart
    ports:
      - "3308:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${SPRING_DATASOURCE_PASSWORD}" ]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - cart-db-volume:/var/lib/mysql
    networks:
      - shopping-network

  order-db:
    image: mysql:latest
    container_name: shoppingMicroservice-order-db
    environment:
      MYSQL_ROOT_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      MYSQL_DATABASE: shopping_microservice_orders
    ports:
      - "3309:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${SPRING_DATASOURCE_PASSWORD}" ]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - order-db-volume:/var/lib/mysql
    networks:
      - shopping-network

  payment-db:
    image: mysql:latest
    container_name: shoppingMicroservice-payment-db
    environment:
      MYSQL_ROOT_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      MYSQL_DATABASE: shopping_microservice_payments
    ports:
      - "3310:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${SPRING_DATASOURCE_PASSWORD}" ]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - payment-db-volume:/var/lib/mysql
    networks:
      - shopping-network

networks:
  shopping-network:

volumes:
  user-db-volume:
  product-db-volume:
  cart-db-volume:
  order-db-volume:
  payment-db-volume:
  kafka-1-volume:
  kafka-2-volume:
  kafka-3-volume:
  grafana-storage:
  redis-volume:
  redis-insight-volume: