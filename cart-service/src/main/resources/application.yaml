spring:
  application:
    name: cart-service
  datasource:
    url: JDBC:mysql://localhost:3306/shopping_microservice_cart
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

server:
  port: 8083

eureka:
  client:
    register-with-eureka: true